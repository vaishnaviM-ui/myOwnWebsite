<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Vish's Point</title>

<style>

body{
font-family:Poppins, sans-serif;
margin:0;
background-image: url("https://www.creativefabrica.com/wp-content/uploads/2024/03/03/Abstract-blue-gradient-color-background-Graphics-92386638-1.jpg");

}

/* SECTION */

.contact{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.contact h2{
font-size:45px;
margin-bottom:10px;
}

.contact p{
font-size:18px;
color:#ffffff;
}

/* CONTACT GRID */

.contact-container{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-top:40px;
}

/* INFO BOX */

.contact-info{
text-align:left;
font-size:18px;
line-height:1.8;
}

/* FORM */

.contact-form input,
.contact-form textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.contact-form textarea{
height:120px;
resize:none;
}

.contact-form button{
background:#ff6b6b;
color:white;
border:none;
padding:12px 25px;
border-radius:6px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

.contact-form button:hover{
background:#e63946;
}

/* MAP */

.map{
margin-top:40px;
}

.map iframe{
width:100%;
height:350px;
border:0;
border-radius:10px;
}

/* BACK BUTTON */

.back-home{
text-align:center;
margin:40px 0;
}

.home-btn{
display:inline-block;
padding:12px 25px;
background:#111;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.3s;
}

.home-btn:hover{
background:#ff6b6b;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
}

/* MOBILE */

@media(max-width:768px){

.contact-container{
grid-template-columns:1fr;
}

}

</style>

</head>


<body>

<section class="contact">

<h2>Contact Us</h2>
<p>We would love to hear from you</p>

<div class="contact-container">

<!-- CONTACT INFO -->

<div class="contact-info">

<p><b>📍 Address:</b> Hitech City, Hyderabad, Telangana, India</p>
<p><b>📧 Email:</b> contact@vishspoint.com</p>
<p><b>📞 Phone:</b> +91 98765 43210</p>

</div>

<!-- CONTACT FORM -->

<div class="contact-form">

<form id="contactForm">

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

<p id="successMsg" style="color:green; display:none; font-weight:600;">
✅ Message sent successfully!
</p>

</div>

</div>

<!-- MAP -->

<div class="map">

<iframe
src="https://www.google.com/maps?q=HITEC+City,+Hyderabad,+Telangana,+India&output=embed"
loading="lazy">
</iframe>

</div>

</section>

<div class="back-home">
<a href="index.html" class="home-btn">⬅ Back to Home</a>
</div>

<footer>

<p>© 2026 Vish's Point</p>

</footer>

<script>

document.getElementById("contactForm").addEventListener("submit", function(e){

e.preventDefault(); // stop refresh

let msg = document.getElementById("successMsg");

msg.style.display = "block";   // show message

this.reset(); // clear form

// hide message after 10 seconds
setTimeout(function(){
msg.style.display = "none";
},3000);

});

</script>

</body>
</html>
